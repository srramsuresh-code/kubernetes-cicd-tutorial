name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Update GitOps repository      
        shell: powershell
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          git config --global credential.helper store
          "https://$($env:GIT_TOKEN):x-oauth-basic@github.com" | Out-File -FilePath "$env:USERPROFILE\.git-credentials" -Encoding ascii -NoNewline
      
          if (Test-Path gitops) { Remove-Item -Recurse -Force gitops }
      
          git clone https://github.com/srramsuresh-code/grade-api-gitops.git gitops
          Set-Location gitops
      
          $content = Get-Content deployment.yaml -Raw
          $content = $content -replace 'image: ghcr\.io/${{ github.repository }}:.*', 'image: ghcr.io/${{ github.repository }}:${{ github.sha }}'
          Set-Content deployment.yaml $content -NoNewline
      
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push -f "https://$($env:GIT_TOKEN)@github.com/srramsuresh-code/grade-api-gitops.git" main main
